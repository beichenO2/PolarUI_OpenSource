<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PolarUI — Workflow Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <script>
    // 首帧前定主题（默认 hermes），防切主题闪白
    document.documentElement.dataset.theme =
      localStorage.getItem('polarui-theme') === 'light' ? 'light' : 'hermes'
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { width: 100%; height: 100%; overflow: hidden; }
    body { background: #f8fafc; color: #111827; }
    [data-theme='hermes'] body { background: #041c1c; color: #ffe6cb; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/checkup-widget/checkup-widget.es.js"></script>
  <link rel="stylesheet" href="/toolcall-editor/tool-list-panel.css">
  <polar-checkup data-project="PolarUI" data-position="bottom-right"></polar-checkup>
  <script type="module" src="/toolcall-editor/tool-list-panel.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
